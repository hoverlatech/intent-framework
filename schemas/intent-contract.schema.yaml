# INTENT Framework v0.5 — Intent Contract Schema
#
# JSON Schema (draft 2020-12) expressed in YAML.
# Source of truth: templates/intent-contract-template.md
#
# This schema defines the machine-readable form of an Intent Contract.
# The portable validator (tools/validate-intent-contract.py) checks YAML
# files against this schema PLUS additional cross-field rules (tier logic,
# scenario coverage, runtime governance gating) that JSON Schema cannot
# express cleanly.
#
# Copy this file into your repo alongside the validator. No framework
# runtime is required.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://hoverlatech.com/intent-framework/v0.5/intent-contract.schema.yaml"
title: "INTENT Intent Contract"
description: "Outcome-centric specification for a single feature or change."
type: object

required:
  - feature_name
  - date
  - phase
  - problem_statement
  - desired_outcomes
  - constraints
  - non_goals
  - user_context
  - quality_bar
  - scenarios
  - proof_plan
  - runtime_governance
  - review_checklist

additionalProperties: false

properties:

  # Identity ----------------------------------------------------------------
  feature_name:
    type: string
    minLength: 1
    description: "Human-readable name of the feature or change."

  branch:
    type: string
    description: "Git branch (e.g. 042-add-payment-retry). Optional but recommended."

  date:
    type: string
    format: date
    description: "ISO date the contract was authored (YYYY-MM-DD)."

  phase:
    type: string
    enum: ["FRAME"]
    description: "Intent Contracts are always authored in the FRAME phase."

  # Problem ------------------------------------------------------------------
  problem_statement:
    type: object
    required: [who_affected, current_state, impact_of_inaction]
    additionalProperties: false
    properties:
      who_affected:
        type: string
        description: "Role or persona experiencing the problem."
      current_state:
        type: string
        description: "What happens today, before this change."
      impact_of_inaction:
        type: string
        description: "What goes wrong if we do not solve this."

  # Outcomes -----------------------------------------------------------------
  desired_outcomes:
    type: array
    minItems: 1
    description: "Measurable outcomes defining success. Each must be observable."
    items:
      type: string
      minLength: 1

  # Boundaries ---------------------------------------------------------------
  constraints:
    type: array
    description: "Things that must be true (technical, regulatory, timeline)."
    items:
      type: string
      minLength: 1

  non_goals:
    type: array
    description: "Explicitly out of scope to prevent scope creep."
    items:
      type: string
      minLength: 1

  # Users --------------------------------------------------------------------
  user_context:
    type: object
    required: [primary_user, current_workflow, expected_workflow]
    additionalProperties: false
    properties:
      primary_user:
        type: string
      secondary_users:
        type: array
        items: {type: string}
      current_workflow:
        type: string
      expected_workflow:
        type: string

  # Quality bar --------------------------------------------------------------
  quality_bar:
    type: object
    additionalProperties: false
    properties:
      performance:
        type: string
        description: "Response time / throughput targets."
      accessibility:
        type: string
        description: "WCAG level / keyboard / screen reader expectations."
      error_handling:
        type: string
        description: "Required clarity of error messages and recovery paths."
      design:
        type: string
        description: "Design-system and consistency constraints."

  # Scenarios ----------------------------------------------------------------
  # Validator additionally enforces: at least 3 scenarios and at least one
  # of type 'failure'.
  scenarios:
    type: array
    minItems: 3
    description: "Concrete scenarios extracted into the Scenario Bank."
    items:
      type: object
      required: [id, name, type, preconditions, steps, expected_outcome, failure_mode]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^S[0-9]+$"
          description: "Stable identifier, e.g. S1, S2, S3."
        name:
          type: string
        type:
          type: string
          enum: ["happy", "edge", "failure"]
          description: "happy = primary path; edge = boundary; failure = adverse path."
        preconditions:
          type: string
        steps:
          type: array
          minItems: 1
          items: {type: string}
        expected_outcome:
          type: string
        failure_mode:
          type: string
          description: "What goes wrong / cascading risk if this scenario is not handled."

  # Proof plan ---------------------------------------------------------------
  # Validator additionally enforces:
  #   - High risk    => autonomy_tier in {A0, A1} and proof_tier >= P3
  #   - Medium risk  => autonomy_tier in {A0, A1, A2} and proof_tier >= P2
  #   - Low risk     => proof_tier >= P1
  proof_plan:
    type: object
    required: [risk_tier, proof_tier, autonomy_tier, evidence_required]
    additionalProperties: false
    properties:
      risk_tier:
        type: string
        enum: ["High", "Medium", "Low"]
        description: "From docs/concepts/risk-classification.md."
      risk_rationale:
        type: string
      proof_tier:
        type: string
        enum: ["P0", "P1", "P2", "P3", "P4"]
        description: "Evidence required to ship. See docs/concepts/proof-tiers.md."
      proof_rationale:
        type: string
      autonomy_tier:
        type: string
        enum: ["A0", "A1", "A2", "A3", "A4"]
        description: "Implementation freedom granted to agents in BUILD."
      autonomy_rationale:
        type: string
      evidence_required:
        type: array
        minItems: 1
        items: {type: string}

  # Runtime governance -------------------------------------------------------
  # Validator additionally enforces: if required == 'Yes', at least one of
  # trust_envelope_version / escalation_contract_version /
  # interaction_state_model_version must be a non-N/A value.
  runtime_governance:
    type: object
    required: [required, why]
    additionalProperties: false
    properties:
      required:
        type: string
        enum: ["Yes", "No"]
        description: "Yes if outputs/actions go live without guaranteed human review."
      why:
        type: string
      trust_envelope_version:
        type: string
        description: "Version string or 'N/A'."
      escalation_contract_version:
        type: string
      interaction_state_model_version:
        type: string
        description: "Note: 'Interaction State Model' is the canonical term."
      validation:
        type: object
        additionalProperties: false
        properties:
          trust_envelope_compliance_method:
            type: string
          escalation_path_verification_method:
            type: string
          state_model_coverage_target:
            type: string
          runtime_evidence_thresholds:
            type: string

  # Open questions -----------------------------------------------------------
  open_questions:
    type: array
    items:
      type: object
      required: [priority, question]
      additionalProperties: false
      properties:
        priority:
          type: string
          enum: ["High", "Medium", "Low"]
        question:
          type: string
        resolution:
          type: string

  # Clarifications -----------------------------------------------------------
  clarifications:
    type: array
    description: "Populated by /speckit.clarify."
    items:
      type: object
      required: [question, answer]
      additionalProperties: false
      properties:
        question: {type: string}
        answer: {type: string}
        date: {type: string, format: date}

  # Review checklist ---------------------------------------------------------
  # Mirrors the checklist at the bottom of intent-contract-template.md.
  # All items must be true before the contract proceeds to EXPLORE.
  review_checklist:
    type: object
    required:
      - outcomes_measurable
      - constraints_explicit
      - scenarios_complete
      - risk_tier_assigned
      - proof_tier_assigned
      - autonomy_tier_assigned
      - runtime_governance_complete
      - constitution_compliant
      - no_contract_contradictions
      - high_priority_questions_resolved
      - non_goals_explicit
    additionalProperties: false
    properties:
      outcomes_measurable: {type: boolean}
      constraints_explicit: {type: boolean}
      scenarios_complete: {type: boolean}
      risk_tier_assigned: {type: boolean}
      proof_tier_assigned: {type: boolean}
      autonomy_tier_assigned: {type: boolean}
      runtime_governance_complete: {type: boolean}
      constitution_compliant: {type: boolean}
      no_contract_contradictions: {type: boolean}
      high_priority_questions_resolved: {type: boolean}
      non_goals_explicit: {type: boolean}
